principles:
  - name: Visibility
    description: There is no Addus API invoice. Visibility applies to internal IT spend on EVV (Electronic
      Visit Verification), scheduling, payer EDI, and clearinghouse fees that support clinical operations.
  - name: Allocation
    description: Allocate IT and integration cost to branch / region and service line (personal care,
      hospice, home health) rather than to API call volume.
  - name: Optimization
    description: Optimization is operational — caregiver utilization, EVV compliance, payer-mix, and
      consolidation of integration vendors — not API-level optimization.
  - name: Accountability
    description: Branch and regional operations leadership own field-cost lines; the corporate revenue-cycle
      and IT teams own the integration and clearinghouse cost lines. There is no external API consumer
      accountable for spend.
